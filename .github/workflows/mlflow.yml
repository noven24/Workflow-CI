name: MLflow CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas prophet matplotlib scikit-learn

    - name: Run MLflow Project
      env:
        MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns
      run: |
        mlflow run MLProject --env-manager=local

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and Push MLflow Docker Image
      run: |
        mlflow models build-docker -m mlruns/0/$(ls -t mlruns/0/ | head -1)/artifacts/model -n noven24/msml-model:latest
        docker push noven24/msml-model:latest
